# CLAUDE.md §5/§5a: two-tier fallback, in order — Gemini (primary), then
# Groq (fallback). No third/offline tier. Model availability on free-tier
# endpoints shifts over time; these are working defaults as of this
# project's build date, not permanent — update here, not by hardcoding a
# model name into an agent.
#
# PROVIDER HISTORY (verified 2026-07-23, real accounts/keys, not just
# docs): the original primary tier was Hugging Face's free "Serverless
# Inference API" (api-inference.huggingface.co) — now retired entirely,
# DNS-dead. Its replacement (router.huggingface.co, "Inference Providers")
# is metered pay-as-you-go: free accounts get $0.10/month credit,
# exhausted almost immediately at real usage — a genuine external change
# to CLAUDE.md §2's zero-paid-resources constraint, not fixable in code.
# Cerebras was evaluated next and rejected: despite blog claims of a
# card-free ongoing free tier, a real account hit 402 Payment Required —
# their current policy requires a payment method before any API access
# works, even to unlock the $5/30-day trial credit. Gemini (Google AI
# Studio) was verified live as genuinely free and card-free (real 200 OK,
# no billing setup) — that's what's configured below. See
# backend/utils/llm_router.py's module docstring for the full account of
# what was tried and why each was rejected.
#
# MODEL NAME (updated 2026-07-24, verified live against a second real
# account): pinned version names are account/project-dependent — the
# original key's account could call gemini-2.5-flash, but a second,
# newer-created Google account got a real 404 "This model
# models/gemini-2.5-flash is no longer available to new users" for the
# exact same model name. gemini-2.0-flash/lite both 429 on that second
# account too (quota), and gemini-3.5-flash 503'd (overloaded). The one
# that worked live on BOTH accounts is the "-latest" alias, which Google
# keeps pointed at whatever current flash model a given project actually
# has access to — more robust than pinning a specific dated version for
# exactly the reason this was discovered. Re-verify with a live call
# before assuming any specific pinned version name works across accounts.
#
# KNOWN LIMIT (verified live via a real 429 body on the first account, not
# docs/blogs — those claimed "20-500 requests/day"; the actual enforced
# value was the bottom of that range): gemini-2.5-flash's free tier capped
# at quotaId "GenerateRequestsPerDayPerProjectPerModel-FreeTier" = 20
# requests/day, project+model scoped. At 3-4 Gemini calls per assessment
# cycle, this exhausts after roughly 5 real assessments — not enough for
# sustained use, only light spot-testing before falling through to Groq
# for the rest of the day. Accepted as a known constraint (per this
# project's own precedent of documenting real limits rather than implying
# more capacity than verified) rather than swapping tier order, since
# Groq's real quota comfortably covers the gap and the two-tier fallback
# already handles this correctly with no code changes needed — Gemini
# serves what it can, Groq covers the rest. The "-latest" alias's own
# daily quota was not separately re-measured; assume similarly limited
# until verified otherwise.
gemini:
  model: "gemini-flash-latest"
  timeout_seconds: 20

groq:
  model: "llama-3.3-70b-versatile"
  timeout_seconds: 20

cache:
  ttl_seconds: 5   # CLAUDE.md §14: cache identical window queries for a few seconds during a demo burst

defaults:
  max_tokens: 1024
  # Per-agent temperature overrides live in each agent, not here — CLAUDE.md
  # §14 requires low temperature + structured JSON specifically for the
  # Compound-Risk Agent, with higher creativity reserved for Explanation.
  temperature: 0.7
