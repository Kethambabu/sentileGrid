name: reactor_kinetics_drift
description: >
  IDV13 (Reaction Kinetics — Slow Drift). A gradual, compound-risk-style
  incident: no single reading crosses an alarm threshold quickly — reactor
  temperature and pressure creep upward together over hours as the reaction
  kinetics drift from their nominal rate. Used to author the
  "reactor_kinetics_drift" near-miss incident (Phase 2 knowledge base).
duration_hours: 16
idv_schedule:
  - idv_number: 13
    start_hour: 0.5
noise_enabled: true
random_seed: 1001
# Checked against this scenario's own seed run: reactor pressure trends DOWN
# over the drift, not up, so the methane/pressure-rise rule has no real
# signal to key off here — left at defaults rather than forced.
synthetic_sensor_rules: {}
